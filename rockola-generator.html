<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rockola — Generator okładek</title>
  <style>
    /* ========== EKRAN ========== */
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f0f0f0;
      color: #222;
    }

    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    p.hint { font-size: 0.85rem; color: #555; margin: 4px 0 12px; }

    .controls {
      background: white;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.15);
    }

    .row { display: flex; gap: 12px; align-items: flex-start; flex-wrap: wrap; }

    .col { flex: 1; min-width: 240px; }
    label { font-size: 0.8rem; font-weight: bold; display: block; margin-bottom: 4px; }

    textarea {
      width: 100%;
      height: 140px;
      font-family: monospace;
      font-size: 0.8rem;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
    }

    .file-zone {
      border: 2px dashed #aaa;
      border-radius: 4px;
      padding: 12px;
      text-align: center;
      font-size: 0.8rem;
      color: #666;
      cursor: pointer;
      min-height: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: #fafafa;
    }
    .file-zone:hover { border-color: #0000ff; background: #f0f4ff; }
    .file-zone input[type=file] { display: none; }

    .sep-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0;
      font-size: 0.8rem;
    }
    .sep-row select {
      padding: 3px 6px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }

    .btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

    button {
      padding: 8px 18px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: bold;
    }
    .btn-primary { background: #0000cc; color: white; }
    .btn-primary:hover { background: #0000ff; }
    .btn-print { background: #2a7a2a; color: white; }
    .btn-print:hover { background: #3aaa3a; }

    .stats {
      font-size: 0.8rem;
      color: #555;
      margin-top: 8px;
    }

    /* ========== PREVIEW KONTENERA ========== */
    .preview-wrapper {
      background: white;
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.15);
    }

    .preview-title {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 12px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 7.5cm);
      gap: 4mm;
    }

    /* ========== KARTA ROCKOLA ========== */
    .jukebox-card {
      width: 7.5cm;
      height: 2.4cm;
      background: #b4c7dc;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid #8a9db0; /* widoczna ramka do wycinania */
    }

    /* Niebieski poziomy pasek */
    .j-bar {
      position: absolute;
      left: 0; right: 0;
      height: 0.35cm;
      background: #0000ff;
      top: 1.03cm;
    }

    /* Biały prostokąt z niebieską obwódką */
    .j-strip {
      position: absolute;
      left: 1cm;
      right: 1cm;
      height: 0.55cm;
      background: white;
      border: 1.5px solid #0000ff;
      top: 0.925cm;
      display: flex;
      align-items: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .j-side {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 3px;
      font-size: 5.5pt;
      line-height: 1;
      overflow: hidden;
      white-space: nowrap;
    }

    .j-side-label {
      font-weight: bold;
      color: #0000ff;
      font-size: 6pt;
      margin-right: 2px;
      flex-shrink: 0;
    }

    .j-side-text {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .j-sep {
      width: 1px;
      height: 70%;
      background: #0000ff;
      flex-shrink: 0;
    }

    /* Tytuł wykonawcy — górna część */
    .j-title {
      position: absolute;
      top: 0; left: 0.2cm; right: 0.2cm;
      height: 0.9cm;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      font-size: 8.5pt;
      font-weight: bold;
      text-align: center;
      line-height: 1.1;
      overflow: hidden;
    }

    /* Numer w lewym dolnym rogu */
    .j-num {
      position: absolute;
      bottom: 0.08cm;
      left: 0.15cm;
      font-size: 5.5pt;
      color: #333;
      font-family: Arial, sans-serif;
    }

    /* Rok/info opcjonalny */
    .j-info {
      position: absolute;
      bottom: 0.08cm;
      right: 0.15cm;
      font-size: 5pt;
      color: #444;
      font-family: Arial, sans-serif;
      text-align: right;
      max-width: 3cm;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .empty-msg {
      padding: 40px;
      text-align: center;
      color: #aaa;
      font-size: 0.9rem;
    }

    /* ========== DRUK ========== */
    @media print {
      html, body {
        margin: 0;
        padding: 0;
        background: white;
      }

      .controls,
      .preview-title {
        display: none;
      }

      .preview-wrapper {
        box-shadow: none;
        border-radius: 0;
        padding: 5mm;
        margin: 0;
      }

      .cards-grid {
        grid-template-columns: repeat(2, 7.5cm);
        gap: 2mm;
      }

      .jukebox-card {
        /* Karty NIE są skalowane — rozmiar fizyczny */
        break-inside: avoid;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      /* Zapobiega ucięciu stron w środku karty */
      .jukebox-card {
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body>

<div class="controls">
  <h1>Rockola — Generator okładek</h1>
  <p class="hint">Wklej dane CSV lub wgraj plik .csv. Kolumny: <code>Title</code>, <code>SideA</code>, <code>SideB</code> (opcjonalnie: <code>Num</code>, <code>Info</code>)</p>

  <div class="row">
    <div class="col">
      <label>Dane CSV:</label>
      <textarea id="csvInput">Title,SideA,SideB
ABBA,Fernando,Life
The Beatles,Hey Jude,Revolution
Elvis Presley,Hound Dog,Don't Be Cruel
Rolling Stones,Satisfaction,Play with Fire
Frank Sinatra,My Way,New York New York
Queen,Bohemian Rhapsody,We Will Rock You</textarea>
    </div>
    <div class="col">
      <label>Lub wgraj plik CSV:</label>
      <div class="file-zone" onclick="document.getElementById('fileInput').click()">
        <div>📁 Kliknij by wybrać plik</div>
        <div style="font-size:0.7rem">(.csv, .txt)</div>
        <input type="file" id="fileInput" accept=".csv,.txt" onchange="loadFile(this)">
      </div>

      <div class="sep-row">
        <span>Separator kolumn:</span>
        <select id="separator">
          <option value="auto">Auto (,  lub  ;)</option>
          <option value=",">Przecinek (,)</option>
          <option value=";">Średnik (;)</option>
          <option value="\t">Tabulator</option>
        </select>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-primary" onclick="generate()">▶ Generuj okładki</button>
    <button class="btn-print" onclick="window.print()">🖨 Drukuj</button>
  </div>
  <div class="stats" id="stats"></div>
</div>

<div class="preview-wrapper">
  <div class="preview-title" id="previewTitle">Podgląd — karty 7,5 × 2,4 cm</div>
  <div class="cards-grid" id="cards">
    <div class="empty-msg">Naciśnij „Generuj okładki" aby zobaczyć podgląd.</div>
  </div>
</div>

<script>
  /* ---- Wykryj separator ---- */
  function detectSep(text) {
    const firstLine = text.split('\n')[0];
    const commas    = (firstLine.match(/,/g)   || []).length;
    const semis     = (firstLine.match(/;/g)   || []).length;
    const tabs      = (firstLine.match(/\t/g)  || []).length;
    if (tabs >= commas && tabs >= semis)   return '\t';
    if (semis >= commas && semis >= tabs)  return ';';
    return ',';
  }

  /* ---- Parser CSV (uwzględnia cudzysłowy) ---- */
  function parseCSV(text, sep) {
    if (sep === 'auto' || !sep) sep = detectSep(text);

    const rows = [];
    const lines = text.trim().split(/\r?\n/);
    for (const line of lines) {
      if (!line.trim()) continue;
      const cols = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQ && line[i+1] === '"') { cur += '"'; i++; }
          else inQ = !inQ;
        } else if (!inQ && line[i] === sep) {
          cols.push(cur.trim()); cur = '';
        } else {
          cur += ch;
        }
      }
      cols.push(cur.trim());
      rows.push(cols);
    }
    return rows;
  }

  /* ---- Wczytaj plik ---- */
  function loadFile(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('csvInput').value = e.target.result;
      generate();
    };
    reader.readAsText(file, 'UTF-8');
  }

  /* ---- Escape HTML ---- */
  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;');
  }

  /* ---- Generuj karty ---- */
  function generate() {
    const raw = document.getElementById('csvInput').value;
    const sep = document.getElementById('separator').value;
    const rows = parseCSV(raw, sep);

    if (rows.length < 2) {
      document.getElementById('cards').innerHTML =
        '<div class="empty-msg">Brak danych — sprawdź format CSV.</div>';
      return;
    }

    const headers = rows[0].map(h => h.toLowerCase());
    const idxTitle = headers.indexOf('title');
    const idxA     = headers.indexOf('sidea');
    const idxB     = headers.indexOf('sideb');
    const idxNum   = headers.indexOf('num');
    const idxInfo  = headers.indexOf('info');

    const data = rows.slice(1);
    const container = document.getElementById('cards');
    container.innerHTML = '';

    let cardNum = 0;

    data.forEach((cols, i) => {
      if (cols.every(c => !c)) return; // pusta linia

      const title = idxTitle >= 0 ? (cols[idxTitle] || '') : (cols[0] || '');
      const sideA = idxA     >= 0 ? (cols[idxA]     || '') : (cols[1] || '');
      const sideB = idxB     >= 0 ? (cols[idxB]     || '') : (cols[2] || '');
      const num   = idxNum   >= 0 ? (cols[idxNum]   || String(i+1)) : String(i+1);
      const info  = idxInfo  >= 0 ? (cols[idxInfo]  || '') : '';

      cardNum++;

      const card = document.createElement('div');
      card.className = 'jukebox-card';
      card.innerHTML = `
        <div class="j-bar"></div>
        <div class="j-strip">
          <div class="j-side">
            <span class="j-side-label">A</span>
            <span class="j-side-text">${esc(sideA)}</span>
          </div>
          <div class="j-sep"></div>
          <div class="j-side">
            <span class="j-side-label">B</span>
            <span class="j-side-text">${esc(sideB)}</span>
          </div>
        </div>
        <div class="j-title">${esc(title)}</div>
        <div class="j-num">${esc(num)}</div>
        ${info ? `<div class="j-info">${esc(info)}</div>` : ''}
      `;
      container.appendChild(card);
    });

    // Ile kart na stronę A4 (2 kolumny × ~12 wierszy)
    const perPage = 24;
    const pages = Math.ceil(cardNum / perPage);
    document.getElementById('stats').textContent =
      `Wygenerowano ${cardNum} okładek — ok. ${pages} strona/stron A4 (po ~${perPage} na stronie)`;
  }

  // Generuj od razu przy starcie
  window.addEventListener('load', generate);
</script>
</body>
</html>
